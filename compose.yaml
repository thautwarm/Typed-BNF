name: typed-bnf

services:
  dev:
    image: typed-bnf-dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typed-bnf-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - tbnf-nuget:/home/dev/.nuget/packages
      - tbnf-deno:/home/dev/.cache/deno
      - tbnf-pnpm-store:/home/dev/.local/share/pnpm/store
      - tbnf-cargo-registry:/home/dev/.cargo/registry
      - tbnf-cargo-git:/home/dev/.cargo/git
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    command: ["sleep", "infinity"]
    init: true
    tty: true

volumes:
  tbnf-nuget:
  tbnf-deno:
  tbnf-pnpm-store:
  tbnf-cargo-registry:
  tbnf-cargo-git:
