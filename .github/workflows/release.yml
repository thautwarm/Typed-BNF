name: Build and Release TBNF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true
        default: '0.4.4'

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: tbnf-linux-x64
            suffix: ''
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact_name: tbnf-linux-arm64
            suffix: ''
          - os: macos-15-intel
            rid: osx-x64
            artifact_name: tbnf-osx-x64
            suffix: ''
          - os: macos-15
            rid: osx-arm64
            artifact_name: tbnf-osx-arm64
            suffix: ''
          - os: windows-latest
            rid: win-x64
            artifact_name: tbnf-win-x64.exe
            suffix: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Force .NET 8 SDK
        run: |
          cat > global.json <<'JSON'
          {
            "sdk": {
              "version": "8.0.100",
              "rollForward": "latestFeature"
            }
          }
          JSON
          dotnet --version
        shell: bash

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install NativeAOT toolchain dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build native AOT binary via NoMake
        run: |
          set -eux
          rm -rf dist .nomake_files/targets
          deno run -A build.ts aot
        shell: bash

      - name: Rename and version binary
        run: |
          set -eux
          ls -lah dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            src="dist/TBNF.CLI.AOT.exe"
          else
            src="dist/TBNF.CLI.AOT"
          fi
          versioned="dist/tbnf-${VERSION}-${{ matrix.rid }}${{ matrix.suffix }}"
          test -f "$src"
          cp "$src" "$versioned"
          cp "$src" "dist/${{ matrix.artifact_name }}"
        shell: bash

      - name: Smoke-test packaged binary
        run: |
          set -eux
          "dist/${{ matrix.artifact_name }}" --version
        shell: bash

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: tbnf-${{ steps.get_version.outputs.version }}-${{ matrix.rid }}${{ matrix.suffix }}
          path: dist/tbnf-${{ steps.get_version.outputs.version }}-${{ matrix.rid }}${{ matrix.suffix }}
          if-no-files-found: error

      - name: Upload generic artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: TBNF v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          overwrite_files: true
          generate_release_notes: true
          files: |
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-linux-x64/tbnf-${{ steps.get_version.outputs.version }}-linux-x64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-linux-arm64/tbnf-${{ steps.get_version.outputs.version }}-linux-arm64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-osx-x64/tbnf-${{ steps.get_version.outputs.version }}-osx-x64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-osx-arm64/tbnf-${{ steps.get_version.outputs.version }}-osx-arm64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-win-x64.exe/tbnf-${{ steps.get_version.outputs.version }}-win-x64.exe
          body: |
            # TBNF v${{ steps.get_version.outputs.version }}

            Backend-agnostic BNF grammar with type inference and semantic actions.

            ## Binaries

            - [Linux x64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-linux-x64)
            - [Linux ARM64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-linux-arm64)
            - [macOS x64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-osx-x64)
            - [macOS ARM64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-osx-arm64)
            - [Windows x64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-win-x64.exe)
