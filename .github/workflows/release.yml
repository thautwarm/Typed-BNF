name: Build and Release TBNF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true
        default: '0.4.4'

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: tbnf-linux-x64
            builder: bflat
            bflat_os: linux
            bflat_arch: x64
            bflat_libc: glibc
            suffix: ''
          - os: ubuntu-latest
            rid: linux-arm64
            artifact_name: tbnf-linux-arm64
            builder: bflat
            bflat_os: linux
            bflat_arch: arm64
            bflat_libc: glibc
            suffix: ''
          - os: ubuntu-latest
            rid: win-x64
            artifact_name: tbnf-win-x64.exe
            builder: bflat
            bflat_os: windows
            bflat_arch: x64
            bflat_libc: shcrt
            suffix: '.exe'
          - os: macos-15-intel
            rid: osx-x64
            artifact_name: tbnf-osx-x64
            builder: nativeaot
            suffix: ''
          - os: macos-15
            rid: osx-arm64
            artifact_name: tbnf-osx-arm64
            builder: nativeaot
            suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate version source
        run: |
          cat > cli/GeneratedVersion.cs <<CS
          namespace TypedBNF;
          public static class GeneratedVersion
          {
            public const string Version = "${VERSION}";
          }
          CS
        shell: bash

      - name: Install bflat
        if: matrix.builder == 'bflat'
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libc++abi1
          mkdir -p "$RUNNER_TEMP/bflat"
          curl -fsSL "https://github.com/bflattened/bflat/releases/download/v8.0.2/bflat-8.0.2-linux-glibc-x64.tar.gz" \
            -o "$RUNNER_TEMP/bflat.tar.gz"
          tar -xzf "$RUNNER_TEMP/bflat.tar.gz" -C "$RUNNER_TEMP/bflat"
          chmod +x "$RUNNER_TEMP/bflat/bflat"
        shell: bash

      - name: Publish managed assemblies for bflat
        if: matrix.builder == 'bflat'
        run: dotnet publish cli/TBNF.CLI.csproj -c Release -f net8.0 -p:PublishSingleFile=false -o dist/managed --nologo
        shell: bash

      - name: Build bflat binary
        if: matrix.builder == 'bflat'
        run: |
          set -eux
          mkdir -p dist
          out="dist/tbnf-${VERSION}-${{ matrix.rid }}${{ matrix.suffix }}"
          export LD_LIBRARY_PATH="$RUNNER_TEMP/bflat:$RUNNER_TEMP/bflat/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          "$RUNNER_TEMP/bflat/bflat" build \
            cli/*.cs cli/Grammar/*.cs \
            -r dist/managed/TBNF.Core.dll \
            -r dist/managed/Antlr4.Runtime.Standard.dll \
            -r dist/managed/FSharp.Core.dll \
            -r dist/managed/Jint.dll \
            -r dist/managed/Acornima.dll \
            -o "$out" \
            --target Exe \
            --os "${{ matrix.bflat_os }}" \
            --arch "${{ matrix.bflat_arch }}" \
            --libc "${{ matrix.bflat_libc }}" \
            --no-globalization \
            --no-debug-info
          cp "$out" "dist/${{ matrix.artifact_name }}"
        shell: bash

      - name: Build NativeAOT macOS binary
        if: matrix.builder == 'nativeaot'
        run: |
          set -eux
          dotnet publish ./cli.aot/TBNF.CLI.AOT.csproj \
            -c Release \
            -f net8.0 \
            -o dist
          src="dist/TBNF.CLI.AOT"
          out="dist/tbnf-${VERSION}-${{ matrix.rid }}"
          test -f "$src"
          cp "$src" "$out"
          cp "$src" "dist/${{ matrix.artifact_name }}"
        shell: bash

      - name: List packaged files
        run: ls -lah dist
        shell: bash

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: tbnf-${{ steps.get_version.outputs.version }}-${{ matrix.rid }}${{ matrix.suffix }}
          path: dist/tbnf-${{ steps.get_version.outputs.version }}-${{ matrix.rid }}${{ matrix.suffix }}
          if-no-files-found: error

      - name: Upload generic artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: TBNF v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-linux-x64/tbnf-${{ steps.get_version.outputs.version }}-linux-x64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-linux-arm64/tbnf-${{ steps.get_version.outputs.version }}-linux-arm64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-osx-x64/tbnf-${{ steps.get_version.outputs.version }}-osx-x64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-osx-arm64/tbnf-${{ steps.get_version.outputs.version }}-osx-arm64
            artifacts/tbnf-${{ steps.get_version.outputs.version }}-win-x64.exe/tbnf-${{ steps.get_version.outputs.version }}-win-x64.exe
          body: |
            # TBNF v${{ steps.get_version.outputs.version }}

            Backend-agnostic BNF grammar with type inference and semantic actions.

            ## Binaries

            - [Linux x64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-linux-x64)
            - [Linux ARM64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-linux-arm64)
            - [macOS x64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-osx-x64)
            - [macOS ARM64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-osx-arm64)
            - [Windows x64](https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/tbnf-${{ steps.get_version.outputs.version }}-win-x64.exe)
