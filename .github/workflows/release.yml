name: Build and Release TBNF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true
        default: '0.4.4'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: TBNF v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            # TBNF v${{ steps.get_version.outputs.version }}

            Backend-agnostic BNF grammar with type inference and semantic actions.

            ## Highlights

            - Add the Rust `rust-lrpar` backend using `grmtools`, `lrlex`, and `lrpar`.
            - Add committed Rust JSON and LR-compatible Lua examples/fixtures.
            - Add Docker/Docker Compose based development and test workflow, plus GitHub CI.

            ## Fixes and improvements

            - Fix type inference/unification regressions around record field access and duplicate type variable checks.
            - Support CommonJS-style `module.exports` in `tbnf.config.js`, with fallback to legacy top-level hooks.
            - Expand grammar regression coverage across C#, TypeScript, and Rust backends.
            - Improve documentation for features, backend status, Rust limitations, and legacy backend notes.
            - Mark Python Lark and OCaml Menhir as legacy/deprecated; OCaml Menhir is currently broken against the current CLI/toolchain.
