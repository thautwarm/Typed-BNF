name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-tests:
    name: Docker test suites
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TBNF_DOCKER_USER: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Run stable test suite
        run: test-scripts/docker-test.sh test all

      - name: Run Rust backend test suite
        run: test-scripts/docker-test.sh test 'rust-*'

      - name: Stop Compose services
        if: always()
        run: test-scripts/docker-test.sh down || true
